<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Virtual NA Meeting Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#050505">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">

  <style>
    :root {
      --bg: #050505;
      --panel: #111214;
      --panel2: #18191c;
      --yellow: #f3d400;
      --green: #22b14c;
      --green2: #39ff74;
      --text: #f5f5f5;
      --muted: #b9b9b9;
      --border: rgba(243, 212, 0, 0.25);
      --glow-yellow: 0 0 14px rgba(243, 212, 0, 0.7);
      --glow-green: 0 0 16px rgba(34, 177, 76, 0.7);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(243, 212, 0, 0.14), transparent 35%),
        radial-gradient(circle at bottom, rgba(34, 177, 76, 0.12), transparent 32%),
        #050505;
      color: var(--text);
      padding: 18px;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      padding: 18px 10px 16px;
    }

    .na-mark-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 4px auto 18px;
    }

    .na-mark {
      width: 132px;
      height: 132px;
      filter: drop-shadow(0 0 14px rgba(243, 212, 0, 0.75));
    }

    .title {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
      letter-spacing: 0.5px;
      color: var(--yellow);
      text-shadow: var(--glow-yellow);
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .na-note {
      margin: 10px auto 0;
      max-width: 650px;
      color: #eeeeee;
      font-size: 13px;
      line-height: 1.45;
      opacity: 0.85;
    }

    .controls-card {
      background: linear-gradient(180deg, rgba(28, 29, 32, 0.96), rgba(12, 13, 15, 0.96));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.65);
      margin-bottom: 16px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }

    .tab {
      border: 1px solid rgba(243, 212, 0, 0.25);
      background: #1a1b1f;
      color: var(--yellow);
      padding: 10px 6px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      text-align: center;
      box-shadow: inset 0 0 10px rgba(243, 212, 0, 0.04);
    }

    .tab.active {
      background: var(--yellow);
      color: #050505;
      box-shadow: var(--glow-yellow);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 10px;
    }

    select,
    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      background: #0b0c0e;
      border: 1px solid rgba(243, 212, 0, 0.35);
      color: var(--text);
      font-size: 16px;
      outline: none;
    }

    select:focus,
    input:focus {
      border-color: var(--yellow);
      box-shadow: var(--glow-yellow);
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 13px 18px;
      background: var(--yellow);
      color: #050505;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: var(--glow-yellow);
    }

    button:active {
      transform: scale(0.98);
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      margin: 12px 2px 0;
    }

    .time-nav {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
    }

    .arrow-btn {
      width: 70px;
      min-height: 60px;
      border-radius: 18px;
      background: var(--yellow);
      color: #050505;
      font-size: 34px;
      line-height: 1;
      box-shadow: var(--glow-yellow);
    }

    .current-block {
      text-align: center;
      color: var(--yellow);
      font-size: 24px;
      font-weight: 700;
      text-shadow: var(--glow-yellow);
    }

    .meeting-list {
      border: 1px solid rgba(34, 177, 76, 0.7);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(8, 9, 10, 0.92);
      box-shadow: 0 0 20px rgba(34, 177, 76, 0.18);
      min-height: 360px;
    }

    .block-header {
      padding: 14px 16px;
      background: linear-gradient(90deg, rgba(34, 177, 76, 0.35), rgba(243, 212, 0, 0.18));
      border-bottom: 1px solid rgba(34, 177, 76, 0.55);
      color: var(--yellow);
      font-size: 18px;
      font-weight: 800;
      text-shadow: 0 0 8px rgba(243, 212, 0, 0.45);
    }

    .meeting {
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .meeting:last-child {
      border-bottom: none;
    }

    .meeting-title {
      font-size: 19px;
      font-weight: 900;
      letter-spacing: 0.4px;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .meta {
      color: #e3e3e3;
      font-size: 15px;
      line-height: 1.45;
      margin-bottom: 4px;
    }

    .join {
      display: inline-block;
      margin-top: 12px;
      padding: 11px 14px;
      border-radius: 14px;
      background: var(--green);
      color: #ffffff;
      text-decoration: none;
      font-weight: 800;
      box-shadow: var(--glow-green);
    }

    .empty {
      padding: 28px 18px;
      color: var(--muted);
      text-align: center;
      font-size: 17px;
    }

    .swipe-note {
      color: #ffffff;
      text-align: center;
      font-size: 18px;
      margin-top: 14px;
      opacity: 0.9;
    }

    @media (max-width: 650px) {
      body {
        padding: 12px;
      }

      .na-mark {
        width: 112px;
        height: 112px;
      }

      .title {
        font-size: 28px;
      }

      .tabs {
        grid-template-columns: repeat(4, 1fr);
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      .arrow-btn {
        width: 58px;
        min-height: 54px;
      }

      .current-block {
        font-size: 19px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div class="na-mark-wrap" aria-hidden="true">
        <svg class="na-mark" viewBox="0 0 140 140" role="img">
          <defs>
            <filter id="yellowGlow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
            <filter id="greenGlow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>

          <polygon points="70,6 134,70 70,134 6,70"
                   fill="rgba(243, 212, 0, 0.06)"
                   stroke="#f3d400"
                   stroke-width="4"
                   filter="url(#yellowGlow)" />

          <polygon points="70,28 112,70 70,112 28,70"
                   fill="rgba(34, 177, 76, 0.08)"
                   stroke="#22b14c"
                   stroke-width="4"
                   filter="url(#greenGlow)" />

          <circle cx="70" cy="70" r="28"
                  fill="#050505"
                  stroke="#ffffff"
                  stroke-width="3" />

          <text x="70"
                y="78"
                text-anchor="middle"
                font-size="28"
                font-family="Arial, Helvetica, sans-serif"
                font-weight="900"
                fill="#f3d400"
                letter-spacing="1">
            NA
          </text>
        </svg>
      </div>

      <h1 class="title">Virtual NA Meeting Finder</h1>
      <div class="subtitle">Find online and phone Narcotics Anonymous meetings by time block</div>
      <div class="na-note">
        Search virtual and phone NA meetings by day and time. Meeting information may change, so please verify details before attending.
      </div>
    </div>

    <div class="controls-card">
      <div class="tabs">
        <button class="tab active" data-day="now">Now</button>
        <button class="tab" data-day="0">S</button>
        <button class="tab" data-day="1">M</button>
        <button class="tab" data-day="2">T</button>
        <button class="tab" data-day="3">W</button>
        <button class="tab" data-day="4">T</button>
        <button class="tab" data-day="5">F</button>
        <button class="tab" data-day="6">S</button>
      </div>

      <div class="controls">
        <select id="daySelect"></select>
        <select id="timeSelect"></select>
      </div>

      <div class="search-row">
        <input id="searchBox" type="text" placeholder="Search meeting name, format, info..." />
        <button onclick="loadMeetings()">Refresh</button>
      </div>

      <p id="status" class="status">Loading meetings...</p>
    </div>

    <div class="time-nav">
      <button class="arrow-btn" onclick="changeTime(-15)">‹</button>
      <div id="currentBlock" class="current-block">Loading...</div>
      <button class="arrow-btn" onclick="changeTime(15)">›</button>
    </div>

    <div id="results" class="meeting-list"></div>

    <div class="swipe-note">← Tap arrows to change time →</div>
  </div>

  <script>
    const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    let allMeetings = [];

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function toDisplayTime(hhmm) {
      const [h, m] = hhmm.split(":").map(Number);
      const date = new Date();
      date.setHours(h, m, 0, 0);

      return date.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function makeTimeBlocks() {
      const select = document.getElementById("timeSelect");
      select.innerHTML = "";

      for (let minutes = 0; minutes < 24 * 60; minutes += 15) {
        const h = Math.floor(minutes / 60);
        const m = minutes % 60;
        const value = `${pad(h)}:${pad(m)}`;
        const option = document.createElement("option");
        option.value = value;
        option.textContent = toDisplayTime(value);
        select.appendChild(option);
      }

      setCurrentTimeBlock();
    }

    function makeDayOptions() {
      const select = document.getElementById("daySelect");
      select.innerHTML = "";

      dayNames.forEach((day, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = day;
        select.appendChild(option);
      });

      select.value = new Date().getDay();
    }

    function setCurrentTimeBlock() {
      const now = new Date();
      const rounded = Math.floor((now.getHours() * 60 + now.getMinutes()) / 15) * 15;
      const h = Math.floor(rounded / 60);
      const m = rounded % 60;

      document.getElementById("daySelect").value = now.getDay();
      document.getElementById("timeSelect").value = `${pad(h)}:${pad(m)}`;
    }

    function changeTime(amount) {
      const timeSelect = document.getElementById("timeSelect");
      const daySelect = document.getElementById("daySelect");

      let [h, m] = timeSelect.value.split(":").map(Number);
      let total = h * 60 + m + amount;
      let day = Number(daySelect.value);

      if (total < 0) {
        total = 23 * 60 + 45;
        day = (day + 6) % 7;
      }

      if (total >= 24 * 60) {
        total = 0;
        day = (day + 1) % 7;
      }

      const newH = Math.floor(total / 60);
      const newM = total % 60;

      daySelect.value = day;
      timeSelect.value = `${pad(newH)}:${pad(newM)}`;

      setActiveTab(day);
      renderMeetings();
    }

    function setActiveTab(day) {
      document.querySelectorAll(".tab").forEach(tab => {
        tab.classList.remove("active");
        if (tab.dataset.day === String(day)) {
          tab.classList.add("active");
        }
      });
    }

    function setupTabs() {
      document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
          if (tab.dataset.day === "now") {
            setCurrentTimeBlock();
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
          } else {
            document.getElementById("daySelect").value = tab.dataset.day;
            setActiveTab(tab.dataset.day);
          }

          renderMeetings();
        });
      });
    }

    function convertMeetingToLocal(meeting) {
      const [h, m] = meeting.startTime.split(":").map(Number);

      return {
        ...meeting,
        localWeekday: Number(meeting.weekday || 0),
        localMinutes: h * 60 + m,
        localTimeText: toDisplayTime(`${pad(h)}:${pad(m)}`)
      };
    }

    function blockKey(minutes) {
      const rounded = Math.floor(minutes / 15) * 15;
      const h = Math.floor(rounded / 60);
      const m = rounded % 60;
      return `${pad(h)}:${pad(m)}`;
    }

    function updateCurrentBlockText() {
      const day = Number(document.getElementById("daySelect").value);
      const time = document.getElementById("timeSelect").value;

      document.getElementById("currentBlock").textContent =
        `${dayNames[day]}, at ${toDisplayTime(time)}`;
    }

    function renderMeetings() {
      const results = document.getElementById("results");
      const day = Number(document.getElementById("daySelect").value);
      const selectedTime = document.getElementById("timeSelect").value;
      const search = document.getElementById("searchBox").value.toLowerCase().trim();

      updateCurrentBlockText();

      const [selectedH, selectedM] = selectedTime.split(":").map(Number);
      const selectedMinutes = selectedH * 60 + selectedM;

      const filtered = allMeetings
        .map(convertMeetingToLocal)
        .filter(m => {
          const haystack = [
            m.name,
            m.source,
            m.fellowship,
            m.formats,
            m.extra,
            m.phone,
            m.joinUrl,
            m.timeZone,
            m.sourceTimeZone,
            dayNames[m.localWeekday],
            m.localTimeText
          ].join(" ").toLowerCase();

          if (search) {
            return haystack.includes(search);
          }

          return (
            m.localWeekday === day &&
            m.localMinutes >= selectedMinutes &&
            m.localMinutes < selectedMinutes + 15
          );
        })
        .sort((a, b) =>
          a.localWeekday - b.localWeekday ||
          a.localMinutes - b.localMinutes ||
          a.name.localeCompare(b.name)
        );

      if (!filtered.length) {
        results.innerHTML = search
          ? `<div class="empty">No meetings found matching “${escapeHtml(search)}”.</div>`
          : `<div class="empty">No meetings found for this 15-minute block.</div>`;
        return;
      }

      const grouped = {};

      filtered.forEach(meeting => {
        const key = `${meeting.localWeekday}-${blockKey(meeting.localMinutes)}`;
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(meeting);
      });

      results.innerHTML = Object.entries(grouped)
        .map(([key, meetings]) => {
          const [weekday, time] = key.split("-");

          return `
            <div>
              <div class="block-header">
                ${search ? "Search result: " : ""}
                ${dayNames[Number(weekday)]} around ${toDisplayTime(time)} (${meetings.length})
              </div>

              ${meetings.map(m => `
                <div class="meeting">
                  <div class="meeting-title">${escapeHtml(m.name)}</div>

                  <div class="meta">
                    Starts: ${escapeHtml(m.localTimeText)}
                    ${m.timeZone ? ` | Shown in: ${escapeHtml(m.timeZone)}` : ""}
                  </div>

                  ${m.source ? `<div class="meta">Source: ${escapeHtml(m.source)}</div>` : ""}
                  ${m.formats ? `<div class="meta">Formats: ${escapeHtml(m.formats)}</div>` : ""}
                  ${m.phone ? `<div class="meta">Phone: ${escapeHtml(m.phone)}</div>` : ""}
                  ${m.extra ? `<div class="meta">${escapeHtml(m.extra)}</div>` : ""}

                  ${m.joinUrl ? `
                    <a class="join" href="${escapeAttr(m.joinUrl)}" target="_blank" rel="noopener">
                      Join Meeting
                    </a>
                  ` : ""}
                </div>
              `).join("")}
            </div>
          `;
        })
        .join("");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    async function loadMeetings() {
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      status.textContent = "Loading meetings...";
      results.innerHTML = `<div class="empty">Loading...</div>`;

      try {
        const userTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || "America/Detroit";
        const response = await fetch(`/api/meetings?tz=${encodeURIComponent(userTimeZone)}`);
        const data = await response.json();

        if (!response.ok || data.error) {
          throw new Error(data.message || "Could not load meetings.");
        }

        allMeetings = data.meetings || [];

        status.textContent = `Loaded ${allMeetings.length} virtual/phone NA meetings. Times shown in ${data.targetTimeZone || userTimeZone}.`;

        renderMeetings();
      } catch (error) {
        status.textContent = "Error loading meetings.";
        results.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      makeDayOptions();
      makeTimeBlocks();
      setupTabs();

      document.getElementById("daySelect").addEventListener("change", () => {
        setActiveTab(document.getElementById("daySelect").value);
        renderMeetings();
      });

      document.getElementById("timeSelect").addEventListener("change", renderMeetings);
      document.getElementById("searchBox").addEventListener("input", renderMeetings);

      loadMeetings();
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js");
    }
  </script>
</body>
</html>
